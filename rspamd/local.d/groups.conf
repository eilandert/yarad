# local.d/groups.conf — score for the YARA symbol.
#
# YARA_MATCH carries the matched rule names as options. A hit means a message or
# attachment matched a curated public malware rule (YARA-Forge / signature-base /
# ANY.RUN) — a strong signal, so it scores. It is one symbol for ANY rule match,
# so the weight is meaningful but deliberately below the reject threshold: a
# single broad rule shouldn't reject mail on its own, it stacks with the rest of
# the score. Tune per your traffic; for a cautious first deploy set weight = 0.0
# to run log-only and watch the history before letting it bite. Per-rule scoring
# (some rules stronger than others) can be layered later via a multimap on the
# symbol options.
group "yara" {
  description = "YARA rule matches via the yarad backend";
  max_score = 15;            # ceiling on this group's combined contribution

  symbols {
    "YARA_MATCH" {
      weight = 7.0;          # strong signal, below reject-alone; stacks with score
      description = "message or attachment matched a YARA rule";
    }
    "URLHAUS_MALWARE_URL" {
      # A URL in the message/macro matched abuse.ch URLhaus (known malware
      # distribution). Exact-URL hits are high-confidence; the matched rule
      # names (URLHAUS_MALWARE_URL / _HOST / _DEOBF) ride as options. Higher
      # than a single YARA rule, still below reject-alone. 0.0 for log-only.
      weight = 8.0;
      description = "message or macro contained a known malware URL (URLhaus)";
    }
  }
}
