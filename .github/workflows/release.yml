# Release. On a v* tag, build the yarad binary for amd64 + arm64 (CGO against the
# statically-linked libyara, exactly as the production image does) and attach
# both to a GitHub release. Binaries are dynamically linked against glibc/libssl/
# libz/libzstd; the static bit is libyara itself.
name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Re-run the full per-PR gate (docker build+test+smoke, lint, scanners) on the
  # tagged commit BEFORE publishing — a release must not ship code that wouldn't
  # pass CI. Reuses ci.yml via workflow_call so there's one source of truth.
  gate:
    permissions:
      contents: read
      actions: write   # ci.yml's docker job uses the buildx GHA cache
    uses: ./.github/workflows/ci.yml

  # One runner per arch so the slow arm64 QEMU build runs in parallel with
  # amd64 instead of after it (was a serial for-loop = sum of both).
  binaries:
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v5  # zizmor: ignore[artipacked]

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3 arm64 emulation
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: build binaries (${{ matrix.arch }})
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          arch="${{ matrix.arch }}"
          docker buildx build \
            --target bin \
            --platform "linux/${arch}" \
            --build-arg "VERSION=${VERSION}" \
            --output "type=local,dest=dist/${arch}" \
            -f docker/Dockerfile .
          install -D "dist/${arch}/yarad" "out/yarad-linux-${arch}"
          # yarad-scan: the lean, CGO-free Sieve/LDA client.
          install -D "dist/${arch}/yarad-scan" "out/yarad-scan-linux-${arch}"
          ls -l out

      - name: upload arch binaries
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.arch }}
          path: out/
          retention-days: 1
          if-no-files-found: error

  # Build .deb packages (yarad daemon + yarad-scan client, amd64 + arm64) from
  # the just-built binaries with nfpm — no debian/ tree, pure-Go packager.
  debs:
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5  # zizmor: ignore[artipacked]

      - name: download arch binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          merge-multiple: true
          path: out/

      - name: install nfpm
        run: |
          set -euo pipefail
          NFPM_VERSION=2.43.0
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_amd64.deb" -o /tmp/nfpm.deb
          sudo dpkg -i /tmp/nfpm.deb

      - name: build .deb packages
        run: |
          set -euo pipefail
          export VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p debout
          cd packaging/deb
          mkdir -p dist
          for arch in amd64 arm64; do
            # nfpm doesn't template the contents src path — stage to a fixed name.
            cp "../../out/yarad-linux-${arch}"      dist/yarad
            cp "../../out/yarad-scan-linux-${arch}" dist/yarad-scan
            export ARCH="$arch"
            nfpm pkg -f nfpm-yarad.yaml      -p deb -t "../../debout/yarad_${VERSION}_${arch}.deb"
            nfpm pkg -f nfpm-yarad-scan.yaml -p deb -t "../../debout/yarad-scan_${VERSION}_${arch}.deb"
          done
          ls -l ../../debout

      - name: upload .deb packages
        uses: actions/upload-artifact@v4
        with:
          name: debs
          path: debout/
          retention-days: 1
          if-no-files-found: error

  release:
    needs: [binaries, debs]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub release + upload assets
      id-token: write   # cosign keyless (Sigstore/Fulcio OIDC) signing
    steps:
      - uses: actions/checkout@v5  # zizmor: ignore[artipacked] (gh release needs repo context)

      - name: download arch binaries
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          merge-multiple: true
          path: out/

      - name: download .deb packages
        uses: actions/download-artifact@v4
        with:
          name: debs
          path: out/

      - name: checksums
        run: |
          set -euo pipefail
          ( cd out && sha256sum yarad-linux-* yarad-scan-linux-* ./*.deb > SHA256SUMS )
          ls -l out

      - name: install cosign + syft
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159  # v3.9.2
      - name: install syft
        uses: anchore/sbom-action/download-syft@7b36ad622f042cab6f59a75c2ac24ccb256e9b45  # v0.20.4

      # SPDX SBOM per binary (source = the built ELF), so consumers can audit the
      # Go module graph baked into each release artifact.
      - name: generate SBOMs
        run: |
          set -euo pipefail
          for f in out/yarad-linux-amd64 out/yarad-linux-arm64 out/yarad-scan-linux-amd64 out/yarad-scan-linux-arm64 out/*.deb; do
            syft scan "file:${f}" -o spdx-json="${f}.sbom.spdx.json"
          done
          ls -l out

      # Keyless-sign every artifact (binaries + checksums + SBOMs). Signatures
      # (.sig) + certs (.pem) are attached too; verify with cosign verify-blob
      # against the issuer/identity (see README).
      - name: sign artifacts (cosign keyless)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          for f in out/yarad-linux-* out/yarad-scan-linux-* out/*.deb out/SHA256SUMS; do
            case "$f" in *.sig|*.pem) continue;; esac
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done
          ls -l out

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Idempotent: if a release for this tag already exists (e.g. created
          # manually before the tag push), upload/overwrite assets onto it
          # instead of failing the whole run on a duplicate. Glob picks up the
          # binaries, SHA256SUMS, .sbom.spdx.json, .sig and .pem files together.
          # Globs catch the binaries plus their .sig/.pem/.sbom.spdx.json and
          # the SHA256SUMS + its signature/cert.
          assets=( out/yarad-linux-* out/yarad-scan-linux-* out/*.deb* out/SHA256SUMS* )
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" --clobber "${assets[@]}"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              "${assets[@]}"
          fi
